<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Office Syndrome Guard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Kanit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .bg-gradient-animate { background: linear-gradient(-45deg, #e0f2fe, #f0fdf4, #fff7ed, #f3e8ff); background-size: 400% 400%; animation: gradient 15s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="bg-gradient-animate h-screen flex flex-col overflow-hidden text-slate-700 items-center justify-center">

    <div class="glass p-8 rounded-3xl shadow-xl w-full max-w-sm flex flex-col items-center">
        <div class="w-16 h-16 bg-teal-500 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg mb-4">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1 class="text-2xl font-bold mb-1 text-slate-800">สมัครสมาชิกใหม่</h1>
        <p class="text-slate-500 text-sm mb-6">เข้าร่วมดูแลสุขภาพกับเรา</p>

        <div id="auth-error" class="hidden w-full bg-rose-100 text-rose-600 text-sm px-4 py-2 rounded-lg mb-4 text-center font-medium"></div>

        <form id="register-form" class="w-full flex flex-col gap-4" onsubmit="handleRegister(event)">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">อีเมล</label>
                <input type="email" id="email" required class="w-full bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1">รหัสผ่าน (อย่างน้อย 6 ตัว)</label>
                <input type="password" id="password" required minlength="6" class="w-full bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition">
            </div>
            
            <button type="submit" id="submit-btn" class="w-full bg-teal-600 text-white font-bold py-3 rounded-xl hover:bg-teal-700 transition shadow-md mt-2 flex items-center justify-center gap-2">
                <span id="btn-text">สร้างบัญชี</span>
                <i id="loading-icon" class="fas fa-circle-notch fa-spin hidden"></i>
            </button>
        </form>

        <div class="mt-6 text-sm text-slate-500">
            มีบัญชีอยู่แล้ว? <a href="login.html" class="text-teal-600 font-bold hover:underline">เข้าสู่ระบบ</a>
        </div>
    </div>

    <script>
        // ใส่ ANON KEY ตรงนี้
        const SUPABASE_URL = 'https://vhvpdxbqhvrkppmlipuw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZodnBkeGJxaHZya3BwbWxpcHV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjU5NTUsImV4cCI6MjA4ODgwMTk1NX0.uPiPAy71qYJpCkq_z4PRHRTFzJ5NIxrePTPv2hVf76Q'; 
        
        // 1. เปลี่ยนชื่อตัวแปรเป็น supabaseClient
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // เช็คว่าล็อกอินอยู่แล้วหรือเปล่า ถ้าใช่ให้เด้งไปหน้าแอปเลย
        document.addEventListener('DOMContentLoaded', async () => {
            // 2. เปลี่ยนมาใช้ supabaseClient
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) window.location.href = 'index.html';
        });

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnText = document.getElementById('btn-text');
            const loadingIcon = document.getElementById('loading-icon');
            const errorBox = document.getElementById('auth-error');
            
            btnText.classList.add('hidden');
            loadingIcon.classList.remove('hidden');
            errorBox.classList.add('hidden');
            errorBox.classList.remove('bg-emerald-100', 'text-emerald-600', 'bg-rose-100', 'text-rose-600');

            try {
                // 3. เปลี่ยนมาใช้ supabaseClient
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                
                if (error) throw error;
                if (!error && data.user && data.user.identities.length === 0) {
                    throw { message: "อีเมลนี้มีอยู่ในระบบแล้ว กรุณาเข้าสู่ระบบ" };
                }
                
                // สำเร็จแล้วพาไปหน้าหลัก
                window.location.href = 'index.html';
                
            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.classList.add('bg-rose-100', 'text-rose-600');
                errorBox.classList.remove('hidden');
            } finally {
                btnText.classList.remove('hidden');
                loadingIcon.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
